name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.release-mode.outputs.dry_run }}
      publish: ${{ steps.release-mode.outputs.publish }}

    steps:
      - name: Check out repository
        # Pinned from actions/checkout@v6. Rotate intentionally for release-path reproducibility.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust stable
        run: rustup default stable

      - name: Set up Node.js
        # Pinned from actions/setup-node@v6. Rotate intentionally for release-path reproducibility.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: npm install -g npm@11.10.0

      - name: Determine release mode
        id: release-mode
        env:
          MANUAL_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              if [ "$MANUAL_DRY_RUN" != "true" ]; then
                echo "Manual publish is disabled. Push a v*.*.* tag to publish."
                exit 1
              fi
              echo "dry_run=true" >> "$GITHUB_OUTPUT"
              echo "publish=false" >> "$GITHUB_OUTPUT"
              ;;
            push)
              if [ "$GITHUB_REF_TYPE" != "tag" ]; then
                echo "Publish workflow push events must be tags. Current ref type: $GITHUB_REF_TYPE"
                exit 1
              fi
              if [ "$GITHUB_ACTOR" != "taishikato" ]; then
                echo "Only taishikato can publish. Current actor: $GITHUB_ACTOR"
                exit 1
              fi

              TAG_VERSION="${GITHUB_REF_NAME#v}"
              PACKAGE_VERSION="$(node -p "require('./package.json').version")"
              if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
                echo "Tag version $TAG_VERSION does not match package.json $PACKAGE_VERSION"
                exit 1
              fi

              git fetch --no-tags --depth=1 origin main
              if ! git merge-base --is-ancestor HEAD origin/main; then
                echo "Tagged commit must be reachable from origin/main."
                exit 1
              fi

              echo "dry_run=false" >> "$GITHUB_OUTPUT"
              echo "publish=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported event: $GITHUB_EVENT_NAME"
              exit 1
              ;;
          esac

      - name: Report package publication status
        if: ${{ steps.release-mode.outputs.publish == 'true' }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGES="$(node - <<'NODE'
          const packageJson = require('./package.json');
          console.log([
            packageJson.name,
            ...Object.keys(packageJson.optionalDependencies ?? {}),
          ].join('\n'));
          NODE
          )"

          while IFS= read -r PACKAGE; do
            if npm view "$PACKAGE@$VERSION" version >/dev/null 2>&1; then
              echo "$PACKAGE@$VERSION is already published and will be skipped where possible."
            else
              echo "$PACKAGE@$VERSION is unpublished."
            fi
          done <<< "$PACKAGES"

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test Rust package
        run: npm test

      - name: Test release workflow
        run: node --test tests/*.test.mjs tools/*.test.mjs

      - name: Preview root package contents
        run: npm pack --dry-run

  publish-platform-packages:
    name: Publish ${{ matrix.package }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    environment: npm-publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: "@chidori-fetch/darwin-arm64"
            path: darwin-arm64
            runner: macos-15
            binary: chidori
          - package: "@chidori-fetch/darwin-x64"
            path: darwin-x64
            runner: macos-15-intel
            binary: chidori
          - package: "@chidori-fetch/linux-arm64"
            path: linux-arm64
            runner: ubuntu-24.04-arm
            binary: chidori
          - package: "@chidori-fetch/linux-x64"
            path: linux-x64
            runner: ubuntu-24.04
            binary: chidori
          - package: "@chidori-fetch/win32-arm64"
            path: win32-arm64
            runner: windows-11-arm
            binary: chidori.exe
          - package: "@chidori-fetch/win32-x64"
            path: win32-x64
            runner: windows-2025
            binary: chidori.exe

    steps:
      - name: Check out repository
        # Pinned from actions/checkout@v6. Rotate intentionally for release-path reproducibility.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust stable
        run: rustup default stable

      - name: Set up Node.js
        # Pinned from actions/setup-node@v6. Rotate intentionally for release-path reproducibility.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: npm install -g npm@11.10.0

      - name: Check platform package publication
        id: platform-version
        if: ${{ needs.verify.outputs.publish == 'true' }}
        shell: bash
        run: |
          VERSION="$(node -p "require('./npm/${{ matrix.path }}/package.json').version")"
          if npm view "${{ matrix.package }}@$VERSION" version >/dev/null 2>&1; then
            echo "${{ matrix.package }}@$VERSION is already published."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "${{ matrix.package }}@$VERSION is unpublished."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Use dry-run package version
        if: ${{ needs.verify.outputs.dry_run == 'true' }}
        shell: bash
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          DRY_RUN_VERSION="${CURRENT_VERSION}-dry-run.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          node tools/sync-npm-platform-version.mjs "$DRY_RUN_VERSION"

      - name: Build native binary
        if: ${{ needs.verify.outputs.dry_run == 'true' || steps.platform-version.outputs.published != 'true' }}
        run: cargo build --release

      - name: Prepare platform package
        if: ${{ needs.verify.outputs.dry_run == 'true' || steps.platform-version.outputs.published != 'true' }}
        run: node tools/prepare-platform-package.mjs --package "${{ matrix.package }}" --directory "${{ matrix.path }}" --binary "target/release/${{ matrix.binary }}"

      - name: Preview platform package contents
        if: ${{ needs.verify.outputs.dry_run == 'true' || steps.platform-version.outputs.published != 'true' }}
        run: npm pack "./npm/${{ matrix.path }}" --dry-run

      - name: Dry-run platform publish
        if: ${{ needs.verify.outputs.dry_run == 'true' }}
        run: npm publish "./npm/${{ matrix.path }}" --dry-run --tag dry-run --access public

      - name: Publish platform package
        if: ${{ needs.verify.outputs.publish == 'true' && steps.platform-version.outputs.published != 'true' }}
        run: npm publish "./npm/${{ matrix.path }}" --access public

  publish-main-package:
    name: Publish chidori-fetch
    needs:
      - verify
      - publish-platform-packages
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Check out repository
        # Pinned from actions/checkout@v6. Rotate intentionally for release-path reproducibility.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        # Pinned from actions/setup-node@v6. Rotate intentionally for release-path reproducibility.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use npm with trusted publishing support
        run: npm install -g npm@11.10.0

      - name: Check root package publication
        id: root-version
        if: ${{ needs.verify.outputs.publish == 'true' }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE="$(node -p "require('./package.json').name")"
          if npm view "$PACKAGE@$VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE@$VERSION is already published."
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "$PACKAGE@$VERSION is unpublished."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Use dry-run package version
        if: ${{ needs.verify.outputs.dry_run == 'true' }}
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          DRY_RUN_VERSION="${CURRENT_VERSION}-dry-run.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          npm version "$DRY_RUN_VERSION" --no-git-tag-version
          node tools/sync-npm-platform-version.mjs "$DRY_RUN_VERSION"

      - name: Preview root package contents
        run: npm pack --dry-run

      - name: Dry-run publish
        if: ${{ needs.verify.outputs.dry_run == 'true' }}
        run: npm publish --dry-run --tag dry-run

      - name: Publish to npm
        if: ${{ needs.verify.outputs.publish == 'true' && steps.root-version.outputs.published != 'true' }}
        run: npm publish
